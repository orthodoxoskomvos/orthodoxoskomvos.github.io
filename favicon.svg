<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Eight-pointed Orthodox Cross — the brand mark of the site.
       Gold (#b08d57) to match the Header brand-mark color exactly. -->
  <g fill="#b08d57" stroke="none">
    <!-- Vertical post -->
    <rect x="14.6" y="2.5" width="2.8" height="27" rx="0.4"/>
    <!-- Top crossbar (titulus) -->
    <rect x="11.2" y="6.5" width="9.6" height="1.8" rx="0.3"/>
    <!-- Main crossbar -->
    <rect x="7.6" y="11" width="16.8" height="2.6" rx="0.3"/>
    <!-- Slanted footrest (suppedaneum) -->
    <rect x="9.6" y="20.4" width="12.8" height="1.8" rx="0.3" transform="rotate(-15 16 21.3)"/>
  </g>
</svg>
